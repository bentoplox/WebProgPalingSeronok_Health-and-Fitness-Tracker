<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saved Recipes - Flow State</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/nutrition.css">

</head>
<body>
    <div class="dashboard-wrapper d-flex min-vh-100">
        <div id="sidebar-container"></div>

        <main class="main-content flex-grow-1 p-4">
            <!-- 1. Keep the Sidebar Toggle up top -->
            <header class="d-flex align-items-center mb-4">
                <button id="sidebarToggle" class="btn btn-outline-secondary border-sand text-olive me-3 rounded-3">
                    <i class="fa-solid fa-bars fs-5"></i>
                </button>
                <h2 class="fw-bold text-olive mb-0">Saved Recipes</h2>
            </header>
            <div class="mt-4 p-5 rounded-4" style="background-color: #fcefdc;">
                <!-- THE BACK BUTTON -->
                <!-- d-inline-block lets us add margin to the bottom. text-decoration-none removes the ugly blue underline! -->
                <a href="nutrition.html" class="text-decoration-none text-muted d-inline-block mb-4">
                    <i class="fa-solid fa-arrow-left me-2"></i> Back to Nutrition Planner
                </a>
                <div class="text-center mb-5">
                    <h2 class="fw-bold">My Saved Recipes</h2>
                    <p class="text-muted">Your curated collection of favorite meals.</p>
                </div>
                
                <!-- THIS IS THE CRITICAL DIV -->
                <div id="savedRecipesContainer" class="row justify-content-center g-4">
                    <!-- JavaScript will inject cards here -->
                </div>
            </div>

        </main>
    </div>

    <!-- 1. Load Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 2. Load the main file (Database, Shared Functions, Global UI) -->
    <script src="../js/nutrition.js"></script>
    
    <!-- 3. Load the specific page logic LAST -->
    <script src="../js/saved-recipes.js"></script>
    
    <script src="../js/sidebar.js"></script>
</body>
</html>
