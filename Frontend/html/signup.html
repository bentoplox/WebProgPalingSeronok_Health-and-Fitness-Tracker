<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up | Flow State</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3" style="background-color: var(--color-cream);">
        <div class="container">
            <img src="../images/favicon.ico" alt="Flow State Logo" height="40"
                class="d-inline-block align-text-top me-2">
            <a class="navbar-brand fw-bold text-olive" href="index.html">Flow State</a>
            <div class="ms-auto">
                <a href="login.html" class="nav-link fw-bold text-olive">Log In Instead</a>
            </div>
        </div>
    </nav>
    
    <main class="container flex-grow-1 d-flex align-items-center justify-content-center pt-5 mt-5">
        <div class="row justify-content-center w-100">
            <div class="col-md-8 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4 feature-card">
                    <div class="card-body p-5">

                        <div class="text-center mb-4">
                            <p class="section-label mb-1">Join the Movement</p>
                            <h2 class="fw-bold text-olive">Create Account</h2>
                        </div>

                        <form id="registerForm" class="needs-validation" novalidate>
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control rounded-3" id="regName" placeholder="Full Name" required>
                                <label for="regName">Full Name</label>
                                <div class="invalid-feedback">Please provide your full name.</div>
                            </div>

                            <div class="form-floating mb-4">
                                <input type="email" class="form-control rounded-3" id="regEmail" placeholder="e.g., ali@gmail.com" required>
                                <label for="regEmail">Email address</label>
                                <div class="invalid-feedback">Please provide a valid email address.</div>
                            </div>

                            <div class="form-floating mb-4">
                                <input type="password" class="form-control rounded-3" id="regPassword" placeholder="Password" minlength="8" required>
                                <label for="regPassword">Password</label>
                                <div class="invalid-feedback">Password must be at least 8 characters long.</div>
                            </div>

                            <button type="submit" class="btn btn-premium w-100 py-3 mb-3 fw-bold rounded-3">START YOUR JOURNEY</button>

                            <div class="text-center mt-3">
                                <p class="mb-0 text-muted">By signing up, you agree to the FlowState Terms of Service.</p>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </main>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
<script src="../js/auth.js"></script>
</body>

</html>
