<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up | Flow State</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">

    <!--Animation-->
    <style>
        /*Slide up and fade in*/
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px);}
            100% { opacity: 1; transform: translateY(0);}
        }

        .animate-up {
            opacity: 0; /*Hidden before animation starts*/
            animation: fadeInUp 0.7s ease-out forwards;
        }

        /*Sway the timing so they load one after another*/
        .delay-1 {animation-delay: 0.1s;}
        .delay-2 {animation-delay: 0.3s;}
        .delay-3 {animation-delay: 0.5s;}

        /*Make inputs feel alive when clicked*/
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(136, 150, 117, 0.25); /*Subtle olive glow*/
            border-color: var(--color-olive, #889675);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100" style="background-color: var(--color-cream, #fdfbf7);">

    <!--Navbar-->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3" style="background-color: var(--color-cream);">
        <div class="container">
            <img src="../images/favicon.ico" alt="Flow State Logo" height="40"
                class="d-inline-block align-text-top me-2">
            <a class="navbar-brand fw-bold text-olive" href="index.html">Flow State</a>
            <div class="ms-auto">
                <a href="login.html" class="nav-link fw-bold text-olive">Log In Instead</a>
            </div>
        </div>
    </nav>
    
    <main class="container flex-grow-1 d-flex align-items-center justify-content-center pt-5 mt-5">
        <div class="row justify-content-center w-100">
            <div class="col-md-8 col-lg-5">

                <div class="card shadow-sm border-0 rounded-5 feature-card animate-up delay-1">
                    <div class="card-body p-5">

                        <!--Progress Bar-->
                        <div class="mb-4">
                            <div class="d-flex justify-content-between mb-1 small text-muted fw-bold">
                                <span>Account Created</span>
                                <span class="text-olive">Profile Setup</span>
                            </div>
                            <div class="progress" style="height: 6px;">
                                <div class="progress-bar" role="progressbar" style="width: 0%; background-color: var(--color-olive, #889675);" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                        </div>

                        <div class="text-center mb-4 animate-up delay-2">
                            <p class="text-uppercase text-olive fw-bold small mb-1 opacity-75" style="letter-spacing: 1px;">Join the Movement</p>
                            <h2 class="fw-bold text-olive">Create Account</h2>
                        </div>

                        <form id="registerForm" class="needs-validation animate-up delay-3" novalidate>
                            <div class="mb-3">
                                <label class="form-label small text-muted fw-bold" for="regName">Full Name</label>
                                <input type="text" class="form-control rounded-3 border-sand px-3 py-2" id="regName" placeholder="Full Name" required>
                                <div class="invalid-feedback">Please provide your full name.</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small text-muted fw-bold" for="regEmail">Email address</label>
                                <input type="email" class="form-control rounded-3 border-sand px-3 py-2" id="regEmail" placeholder="e.g., ali@gmail.com" required>
                                <div class="invalid-feedback">Please provide a valid email address.</div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label small text-muted fw-bold" for="regPassword">Password</label>
                                <input type="password" class="form-control rounded-3 border-sand px-3 py-2" id="regPassword" placeholder="••••••••" minlength="8" required>
                                <div class="invalid-feedback">Password must be at least 8 characters long.</div>
                            </div>

                            <button type="submit" class="btn btn-premium w-100 py-3 mb-3 fw-bold rounded-3 shadow-sm text-uppercase">Start Your Journey</button>

                            <div class="text-center mt-3">
                                <p class="mb-0 text-muted small">By signing up, you agree to the FlowState Terms of Service.</p>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
<script src="../js/auth.js"></script>
</body>

</html>
