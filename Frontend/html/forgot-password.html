<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password | Flow State</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3" style="background-color: var(--color-cream);">
        <div class="container">
            <img src="../images/favicon.ico" alt="Flow State Logo" height="40"
                class="d-inline-block align-text-top me-2">
            <a class="navbar-brand fw-bold text-olive">Flow State</a>
        </div>
    </nav>

    <main class="container flex-grow-1 py-5 d-flex align-items-center">
        <div class="row justify-content-center w-100">
            <div class="col-md-8 col-lg-5">

                <div class="card shadow-sm border-0 rounded-5 feature-card">
                    <div class="card-body p-5">

                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-olive mb-2">Reset Password</h2>
                            <p class="text-muted small" id="resetDescription">Enter your email and we'll send you a secure link to reset your password.</p>
                        </div>

                        <div id="successMessage" class="alert alert-success d-none text-center rounded-3 mb-4" role="alert">
                            <h6 class="fw-bold mb-1">Check your inbox!</h6>
                            <p class="small mb-0">If an account exists for that email, a reset link has been sent.</p>
                        </div>

                        <form id="forgotForm" class="needs-validation" novalidate>

                            <div class="mb-4">
                                <label class="form-label small text-muted fw-bold" for="resetEmail">Email Address</label>
                                <input type="email" class="form-control rounded-3 small border-sand px-3 py-2 opacity-75" id="resetEmail" placeholder="e.g.,ali@gmail.com" required>
                            </div>

                            <button type="submit" class="btn btn-premium w-100 py-3 fw-bold rounded-3 text-uppercase mb-4">Send Reset Link</button>

                        </form>

                        <div class="text-center mt-2">
                            <a href="login.html" class="text-olive small fw-bold text-decoration-none">Back to Login</a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>

</body>
</html>
