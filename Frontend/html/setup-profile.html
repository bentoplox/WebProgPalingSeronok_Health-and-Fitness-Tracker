<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register Health and Fitness Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light py-3" style="background-color: var(--color-cream);">
        <div class="container justify-content-center">
            <h4 class="fw-bold text-olive mb-0">Flow State Setup</h4>
        </div>
    </nav>

    <main class="container flex-grow-1 py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg border-0 rounded-4 feature-card">
                    <div class="card-body p-5">

                        <div class="text-center mb-5">
                            <p class="section-label mb-1">Step 2 of 2</p>
                            <h2 class="fw-bold text-olive">Personalize Your Journey</h2>
                            <p class="text-muted">We need a few details to calculate your baseline metrics.</p>
                        </div>

                        <form id="setupForm" class="needs-validation" novalidate>

                            <h5 class="fw-bold text-olive mb-3 border-bottom border-olive pb-2">1. Core Biometrics</h5>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <select class="form-select rounded-3" id="userGender" required>
                                            <option value="" disabled selected>Select Biological Sex</option>
                                            <option value="male">Male</option>
                                            <option value="female">Female</option>
                                        </select>
                                        <label for="userGender">Biological Sex (For BMR calc)</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input type="number" class="form-control rounded-3" id="userHeight" placeholder="Height" required>
                                        <label for="userHeight">Height (cm)</label>
                                    </div>
                                </div>
                            </div>

                            <h5 class="fw-bold text-olive mb-3 border-bottom border-olive pb-2">2. Lifestyle & Goals</h5>
                            <div class="row g-3 mb-4">
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <select class="form-select rounded-3" id="userActivity" required>
                                            <option value="" disabled selected>Select Activity Level</option>
                                            <option value="sedentary">Sedentary (Little to no exercise)</option>
                                            <option value="light">Lightly Active (Exercise 1-3 days/week)</option>
                                            <option value="moderate">Moderately Active (Exercise 3-5 days/week)</option>
                                            <option value="active">Very Active (Exercise 6-7 days/week)</option>
                                        </select>
                                        <label for="userActivity">Activity Level</label>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <select class="form-select rounded-3" id="userGoal" required>
                                            <option value="" disabled selected>Select Primary Goal</option>
                                            <option value="lose">Lose Weight</option>
                                            <option value="maintain">Maintain Health</option>
                                            <option value="gain">Build Muscle</option>
                                        </select>
                                        <label for="userGoal">Primary Goal</label>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input type="number" class="form-control rounded-3" id="targetWeight" placeholder="Target Weight" step="0.1" required>
                                        <label for="targetWeight">Target Weight (kg)</label>
                                    </div>
                                </div>
                            </div>

                            
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
