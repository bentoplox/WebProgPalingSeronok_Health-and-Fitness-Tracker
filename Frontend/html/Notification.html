<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | Flow State</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/notification.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>

<body>

    <div class="dashboard-wrapper">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="d-flex align-items-center mb-4 mb-md-5 flex-nowrap">
                <button id="sidebarToggle"
                    class="btn btn-outline-secondary border-sand text-olive me-2 me-md-3 rounded-3 flex-shrink-0">
                    <i class="fa-solid fa-bars fs-5"></i>
                </button>
                <h2 class="fw-bold text-olive mb-0 fs-4 fs-md-2 text-truncate-mobile">Notifications & Reminder</h2>
            </header>

            <div class="d-lg-none mb-4 text-center">
                <ul class="nav nav-pills bg-light rounded-pill p-1 shadow-sm d-inline-flex" id="mobileTabs">
                    <li class="nav-item">
                        <button class="nav-link active rounded-pill px-4"
                            onclick="toggleView('noti-view')">Notifications</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link rounded-pill px-4"
                            onclick="toggleView('remind-view')">Reminders</button>
                    </li>
                </ul>
            </div>

            <div class="row g-4">
                <div id="noti-section" class="col-lg-7 col-12">
                    <div class="card notification-center-card p-4 rounded-5 border-0 shadow-sm">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="fw-bold text-olive mb-0">Notification Center</h5>
                            <button class="btn btn-sm btn-light rounded-3 btn-see-all text-muted px-3">See All</button>
                        </div>

                        <div class="nav nav-pills bg-light rounded-3 p-1 mb-4 d-inline-flex shadow-sm gap-2"
                            id="pills-tab">
                            <button class="nav-link active rounded-3 px-4 py-1 small" data-bs-toggle="pill"
                                data-bs-target="#today">Today</button>
                            <button class="nav-link rounded-3 px-4 py-1 small" data-bs-toggle="pill"
                                data-bs-target="#week">This Week</button>
                        </div>

                        <div class="tab-content" id="pills-tabContent">
                            <div class="tab-pane fade show active" id="today">

                                <div
                                    class="noti-item-minimal d-flex align-items-start p-3 mb-3 rounded-4 shadow-sm border-0 glass-blue unread">
                                    <div class="noti-icon-box me-3">
                                        <i class="fa-solid fa-circle-info"></i>
                                    </div>
                                    <div class="flex-grow-1">
                                        <div class="d-flex justify-content-between align-items-start">
                                            <div>
                                                <div class="d-flex align-items-center mb-1">
                                                    <span class="unread-dot me-2"></span>
                                                    <h6 class="mb-0 fw-bold text-dark small">Health Insight</h6>
                                                </div>
                                                <p class="mb-0 noti-description text-muted extra-small">Fetching latest
                                                    health tip...</p>
                                            </div>
                                            <div class="d-flex flex-column align-items-end ps-2">
                                                <span class="extra-small text-muted mb-1">1h ago</span>
                                                <div class="d-flex align-items-center gap-3">
                                                    <button type="button" class="btn-action-small"
                                                        title="Mark as read"><i class="fa-solid fa-check"></i></button>
                                                    <button type="button" class="btn-action-small" title="Dismiss"><i
                                                            class="fa-solid fa-xmark"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div
                                    class="noti-item-minimal d-flex align-items-start p-3 mb-3 rounded-4 shadow-sm border-0 glass-yellow">
                                    <div class="noti-icon-box me-3">
                                        <i class="fa-solid fa-utensils"></i>
                                    </div>
                                    <div class="flex-grow-1">
                                        <div class="d-flex justify-content-between align-items-start">
                                            <div>
                                                <div class="d-flex align-items-center mb-1">
                                                    <h6 class="mb-0 fw-bold text-dark small">Meal</h6>
                                                </div>
                                                <p class="mb-0 noti-description text-muted extra-small">Meal suggestion
                                                    yummy yumyum.</p>
                                            </div>
                                            <div class="d-flex flex-column align-items-end ps-2">
                                                <span class="extra-small text-muted mb-1">5h ago</span>
                                                <button type="button" class="btn-action-small" title="Dismiss"><i
                                                        class="fa-solid fa-xmark"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div
                                    class="noti-item-minimal d-flex align-items-start p-3 mb-3 rounded-4 shadow-sm border-0 glass-red">
                                    <div class="noti-icon-box me-3">
                                        <i class="fa-solid fa-bell"></i>
                                    </div>
                                    <div class="flex-grow-1">
                                        <div class="d-flex justify-content-between align-items-start">
                                            <div>
                                                <div class="d-flex align-items-center mb-1">
                                                    <h6 class="mb-0 fw-bold text-dark small">Log</h6>
                                                </div>
                                                <p class="mb-0 noti-description text-muted extra-small">Failed to sync
                                                    with your fitness wearable.</p>
                                            </div>
                                            <div class="d-flex flex-column align-items-end ps-2">
                                                <span class="text-muted extra-small mb-1">8h ago</span>
                                                <button type="button" class="btn-action-small" title="Dismiss"><i
                                                        class="fa-solid fa-xmark"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>

                <div id="remind-section" class="col-lg-5 col-12 d-lg-block">
                    <div class="card feature-card p-4 border-0 rounded-5 h-100 shadow-sm">
                        <h5 class="fw-bold text-olive mb-4">Set Reminder</h5>
                        <div class="mb-3">
                            <label class="form-label small text-muted fw-bold">Title</label>
                            <input type="text" class="form-control rounded-3 border-sand px-3 py-2"
                                placeholder="e.g. Morning Yoga">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted fw-bold">Description</label>
                            <textarea class="form-control rounded-3 border-sand px-3" rows="3"
                                placeholder="Add duration or details..."></textarea>
                        </div>
                        <label class="form-label small text-muted fw-bold mb-3">Choose Category</label>
                        <div class="d-flex gap-2 mb-4 flex-wrap">
                            <button class="btn category-btn border-red active" onclick="setCategory('red')"><i
                                    class="fa-solid fa-bell"></i> <span>Log</span></button>
                            <button class="btn category-btn border-yellow" onclick="setCategory('yellow')"><i
                                    class="fa-solid fa-utensils"></i> <span>Meal</span></button>
                            <button class="btn category-btn border-blue" onclick="setCategory('blue')"><i
                                    class="fa-solid fa-circle-info"></i> <span>Info</span></button>
                            <button class="btn category-btn border-green" onclick="setCategory('green')"><i
                                    class="fa-solid fa-trophy"></i> <span>Goal</span></button>
                        </div>
                        <div class="row g-2 mb-4">
                            <div class="col-6">
                                <label class="form-label small text-muted fw-bold">Date</label>
                                <input type="date" class="form-control rounded-3 border-sand py-2">
                            </div>
                            <div class="col-6">
                                <label class="form-label small text-muted fw-bold">Time</label>
                                <input type="time" class="form-control rounded-3 border-sand py-2">
                            </div>
                        </div>
                        <button class="btn btn-flow w-100 py-3 rounded-4 text-white fw-bold shadow-sm mt-auto">Create
                            Reminder</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/notification.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

</body>

</html>
