<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log In | Flow State</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">

    <!--Animation-->
    <style>
        /*Slide up and fade in*/
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px);}
            100% { opacity: 1; transform: translateY(0);}
        }

        .animate-up {
            opacity: 0; /*Hidden before animation starts*/
            animation: fadeInUp 0.7s ease-out forwards;
        }

        /*Sway the timing so they load one after another*/
        .delay-1 {animation-delay: 0.1s;}
        .delay-2 {animation-delay: 0.3s;}
        .delay-3 {animation-delay: 0.5s;}

        /*Make inputs feel alive when clicked*/
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(136, 150, 117, 0.25); /*Subtle olive glow*/
            border-color: var(--color-olive, #889675);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100" style="background-color: var(--color-cream, #fdfbf7);">

    <!--Navbar-->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3" style="background-color: var(--color-cream);">
        <div class="container">
            <img src="../images/favicon.ico" alt="Flow State Logo" height="40"
                class="d-inline-block align-text-top me-2">
            <a class="navbar-brand fw-bold text-olive" href="index.html">Flow State</a>
            <div class="ms-auto">
                <a href="" class="nav-link fw-bold text-olive"></a>
            </div>
        </div>
    </nav>
    
    <main class="container flex-grow-1 d-flex align-items-center py-5 mt-5">
        <div class="row justify-content-center w-100">
            <div class="col-md-8 col-lg-5">

                <div class="card shadow-sm border-0 rounded-5 feature-card animate-up delay-1">
                    <div class="card-body p-5">

                        <div class="text-center mb-4 animate-up delay-2">
                            <h2 class="fw-bold text-olive">Welcome Back</h2>
                            <p class="text-muted small">Enter your details to access your dashboard.</p>
                        </div>

                        <form id="loginForm" class="needs-validation animate-up delay-3" novalidate>

                            <div class="mb-4">
                                <label class="form-label small text-muted fw-bold" for="loginEmail">Email Address</label>
                               <input type="email" class="form-control rounded-3 border-sand px-3 py-2" id="loginEmail" placeholder="e.g., ali@gmail.com" required>
                            </div>

                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                <label class="form-label small text-muted fw-bold mb-0" for="loginPassword">Password</label>
                                <a href="forgot-password.html" class="text-olive small text-decoration-none opacity-75">Forgot password?</a>
                                </div>
                                <input type="password" class="form-control rounded-3 border-sand px-3 py-2" id="loginPassword" placeholder="••••••••" required>
                            </div>

                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                                <label class="form-check-label small text-muted" for="rememberMe">
                                    Remember me for 30 days
                                </label>
                            </div>

                            <button type="submit" class="btn btn-premium w-100 py-3 mb-3 fw-bold rounded-3 shadow-sm text-uppercase mb-4">Log In</button>

                            <div class="text-center">
                                <p class="mb-0 text-muted small">Don't have an account? <a href="signup.html" class="text-olive fw-bold text-decoration-none">Sign up</a></p>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
<script src="../js/auth.js"></script>

</body>
</html>
