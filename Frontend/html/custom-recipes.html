<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Custom Recipes - Flow State</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/nutrition.css">
</head>
<body>
    <div class="dashboard-wrapper d-flex min-vh-100">
        <div id="sidebar-container"></div>

        <main class="main-content flex-grow-1 p-4">
            <header class="d-flex align-items-center mb-5">
                <button id="sidebarToggle" class="btn btn-outline-secondary border-sand text-olive me-3 rounded-3">
                    <i class="fa-solid fa-bars fs-5"></i>
                </button>
                <h2 class="fw-bold text-olive mb-0">Custom Recipes</h2>
            </header>

            <a href="nutrition.html" class="text-decoration-none text-olive mb-4 d-inline-block">
                <i class="fa-solid fa-arrow-left me-2"></i>Back to Planner
            </a>

            <!-- The Grid -->
            <div class="row mt-3">
                <!-- Recipe Card 1 -->
                <div class="col-md-3 mb-4">
                    <div class="card h-100 shadow-sm border-0" style="background-color: #fcefdc;">
                        <img src="../images/recipes/hummus-avocado-toast.png" class="card-img-top" alt="Food">
                        <div class="card-body text-center">
                            <h6 class="fw-bold text-olive">Hummus Avocado Toast</h6>
                            <p class="text-muted small"><i class="fa-regular fa-clock"></i> 5 mins | 🌱 Vegan</p>
                            <h5 class="text-success fw-bold mb-3">527 kcal</h5>
                            <a href="recipe-details.html" class="btn btn-outline-success w-100">View Recipe</a>
                        </div>
                    </div>
                </div>
                <!-- You can copy-paste that col-md-3 block to add more cards -->
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/sidebar.js"></script> 
    <script src="../js/main.js"></script>
</body>
</html>
