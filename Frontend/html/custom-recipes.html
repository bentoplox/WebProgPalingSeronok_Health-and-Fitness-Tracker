<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Custom Recipes - Flow State</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/nutrition.css">
</head>
<body>
    <div class="dashboard-wrapper d-flex min-vh-100">
        <div id="sidebar-container"></div>

        <main class="main-content flex-grow-1 p-4">
            <!-- 1. Keep the Sidebar Toggle up top -->
            <header class="d-flex align-items-center mb-4">
                <button id="sidebarToggle" class="btn btn-outline-secondary border-sand text-olive me-3 rounded-3">
                    <i class="fa-solid fa-bars fs-5"></i>
                </button>
                <div>
                    <p class="text-muted small fw-bold mb-1">NUTRITION PLANNER / CUSTOM RECIPES</p>
                    <h2 class="fw-bold text-olive mb-0">Custom Recipes</h2>
                </div>
            </header>

            <!-- 2. The Beige Wrapper (Matches Saved Recipes) -->
            <div class="mt-4 p-5 rounded-4" style="background-color: #fcefdc;">
                
                <!-- THE BACK BUTTON -->
                <a href="nutrition.html" class="text-decoration-none text-muted d-inline-block mb-4">
                    <i class="fa-solid fa-arrow-left me-2"></i> Back to Planner
                </a>

                <!-- Centered Titles -->
                <div class="text-center mb-5">
                    <h2 class="fw-bold">My Custom Recipes</h2>
                    <p class="text-muted">Meals you have tweaked, created, and customized.</p>
                </div>

                <!-- 3. The Grid (Centered) -->
                <div class="row justify-content-center g-4">
                    
                    <!-- Updated Recipe Card (Using your span button fix!) -->
                    <div class="col-md-3">
                        <a href="recipe-details.html" class="text-decoration-none text-dark d-block h-100 position-relative">
                            <div class="card h-100 shadow-sm border-0 rounded-extra hover-elevate">
                                <img src="../images/recipes/hummus-avocado-toast.png" class="card-img-top" alt="Hummus Avocado Toast" style="height: 160px; object-fit: cover; border-radius: 8px 8px 0 0;">
                                <div class="card-body text-center d-flex flex-column">
                                    <div><span class="badge bg-success me-1 mb-2">Low Calorie</span></div>
                                    <h6 class="card-title fw-bold mb-1">Hummus Avocado Toast (My Version)</h6>
                                    <small class="text-muted mb-3">🕒 15 mins | 🥦 Vegan</small>
                                    <h5 class="fw-bold calories-text mb-3">496 kcal</h5>
                                    <span class="btn btn-recipe mt-auto">View Recipe</span>
                                </div>
                            </div>
                        </a>
                    </div>

                    <!-- THE UX BONUS: "Create New" Card -->
                    <div class="col-md-3">
                        <a href="create-recipe.html" class="text-decoration-none text-dark d-block h-100" onclick="localStorage.setItem('editPath', 'create')">
                            <!-- Dashed border and transparent background makes it look like an "add" slot -->
                            <div class="card h-100 shadow-sm border-2 rounded-extra hover-elevate d-flex justify-content-center align-items-center" style="background-color: transparent; border: 2px dashed #bcaaa4 !important; min-height: 280px;">
                                <div class="text-center text-muted">
                                    <i class="fa-solid fa-plus-circle fs-1 mb-2 text-success"></i>
                                    <h6 class="fw-bold">Create New Recipe</h6>
                                </div>
                            </div>
                        </a>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/sidebar.js"></script> 
    <script src="../js/main.js"></script>
    <script>
        // Drop the Origin crumb for this page
        localStorage.setItem('recipeOrigin', 'CUSTOM RECIPES');
    </script>
</body>
</html>
